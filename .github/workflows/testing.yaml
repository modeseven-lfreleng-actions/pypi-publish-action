# SPDX-FileCopyrightText: 2025 The Linux Foundation

# Action test/validation workflow
name: 'Test GitHub Action 🧪'

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  # Cannot be tested on pull request; secrets not available
  push:
    branches: ['main']

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: true

permissions: {}

env:
  tag: '0.0.1-dev0'

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: 'Test local GitHub Action'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 'Checkout repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Perform setup prior to running test(s)
      - name: 'Checkout sample project repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: "lfreleng-actions/test-python-project"
          path: 'test-python-project'

      - name: 'Build Python project'
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/python-build-action@97cf36d2a5914c94761408545d154c983024de1d # v2.0.0
        with:
          tag: "${{ env.tag }}"
          path_prefix: 'test-python-project'

      - name: "Running local action: ${{ github.repository }}"
        uses: ./
        with:
          path_prefix: 'test-python-project'
          tag: "${{ env.tag }}"
          no_checkout: true
          op_service_account_token: "${{ secrets.op_service_account_token }}"
          one_password_item: "${{ vars.one_password_item }}"
          pypi_credential: "${{ secrets.pypi_credential }}"
          publish_disable: true
